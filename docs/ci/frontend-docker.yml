# Builds the Next.js frontend image on every push to main (frontend changes).
# Point EasyPanel at ghcr.io/<owner>/skinksa-frontend:latest or add a deploy webhook.
name: Frontend Docker

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-docker.yml"
  workflow_dispatch:

concurrency:
  group: frontend-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: skinksa-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger EasyPanel redeploy (optional)
        env:
          HOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "${HOOK:-}" ]; then
            echo "No secret EASYPANEL_DEPLOY_WEBHOOK — skip. Add it under Repo → Settings → Secrets."
            exit 0
          fi
          curl -fsS --max-time 120 -X POST "$HOOK"
          echo "Deploy hook OK"
