  <rect x="96" y="36" width="68" height="88" rx="34" fill="white" fill-opacity="0.5" />
  <!-- Serum bottle on vanity -->
  <rect x="180" y="95" width="22" height="48" rx="8" fill="#312E81" />
  <rect x="185" y="88" width="12" height="12" rx="4" fill="#1e1b4b" />
  <!-- Small bottle -->
  <rect x="215" y="108" width="16" height="35" rx="6" fill="#B7791F" />
  <rect x="219" y="102" width="8" height="10" rx="3" fill="#92400e" />
  <!-- Flowers decoration -->
  <circle cx="50" cy="130" r="8" fill="#fca5a5" fill-opacity="0.7" />
  <circle cx="62" cy="124" r="6" fill="#fda4af" fill-opacity="0.6" />
  <circle cx="44" cy="120" r="5" fill="#f9a8d4" fill-opacity="0.7" />
  <text x="150" y="180" text-anchor="middle" fill="#475569" font-size="9" font-family="sans-serif">Lifestyle</text>
</svg>
