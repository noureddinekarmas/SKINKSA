      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B7791F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#copperGrad)" />
  <!-- Molecule structure -->
  <circle cx="100" cy="80" r="18" fill="white" fill-opacity="0.9" />
  <circle cx="60" cy="120" r="12" fill="white" fill-opacity="0.7" />
  <circle cx="140" cy="120" r="12" fill="white" fill-opacity="0.7" />
  <circle cx="80" cy="155" r="10" fill="white" fill-opacity="0.5" />
