  <line x1="100" y1="98" x2="135" y2="112" stroke="white" stroke-width="2.5" stroke-opacity="0.6" />
  <line x1="62" y1="132" x2="82" y2="147" stroke="white" stroke-width="2" stroke-opacity="0.5" />
  <line x1="138" y1="132" x2="118" y2="147" stroke="white" stroke-width="2" stroke-opacity="0.5" />
