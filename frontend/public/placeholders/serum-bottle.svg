<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312E81;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B7791F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312E81;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Bottle cap -->
  <rect x="75" y="20" width="50" height="35" rx="8" fill="url(#capGrad)" />
  <!-- Neck -->
  <rect x="85" y="50" width="30" height="20" rx="4" fill="url(#capGrad)" />
  <!-- Bottle body -->
  <rect x="50" y="68" width="100" height="180" rx="20" fill="url(#bottleGrad)" />
  <!-- Label background -->
  <rect x="60" y="100" width="80" height="120" rx="10" fill="white" fill-opacity="0.15" />
  <!-- Label text placeholder -->
  <text x="100" y="135" text-anchor="middle" fill="white" font-size="9" font-family="sans-serif" font-weight="bold">SKINKSA</text>
  <text x="100" y="152" text-anchor="middle" fill="white" font-size="7" font-family="sans-serif" opacity="0.8">Blue Copper</text>
  <text x="100" y="166" text-anchor="middle" fill="white" font-size="7" font-family="sans-serif" opacity="0.8">Peptide Serum</text>
  <text x="100" y="184" text-anchor="middle" fill="white" font-size="7" font-family="sans-serif" opacity="0.7">30 ml</text>
  <!-- Shine effect -->
  <rect x="58" y="78" width="12" height="160" rx="6" fill="white" fill-opacity="0.12" />
</svg>
